<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>Modelo 3D AR - A-Frame</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
<a-scene
  id="scene"
  webxr="optionalFeatures: hit-test, local-floor"
  renderer="alpha: true; antialias: true"
  vr-mode-ui="enabled: true">

  <a-sky id="sky" src="image.png"></a-sky>

  <a-light
    type="ambient"
    intensity="0.8">
  </a-light>

  <a-light
    type="directional"
    position="2 5 3"
    intensity="1"
    cast-shadow="true">
  </a-light>

  <a-camera
    id="camera"
    position="0 1.6 6">
  </a-camera>

  <a-entity
    id="modelo"
    gltf-model="Templo del sol.glb"
    position="0 0.8 0"
    scale="2 2 2"
    shadow="cast: true"
  </a-entity>

</a-scene>

<script>

const scene = document.querySelector('#scene');
const sky = document.querySelector('#sky');
const modelo = document.querySelector('#modelo');

scene.addEventListener('enter-vr', () => {

  if (scene.is('ar-mode')) {

    console.log("Modo AR iniciado");
    sky.setAttribute('visible', false);
    modelo.setAttribute('position', '0 0 -11');
    modelo.setAttribute('scale', '2 2 2');
  }
});

scene.addEventListener('exit-vr', () => {
  console.log("Saliendo AR");
  sky.setAttribute('visible', true);
  modelo.setAttribute('position', '0 0.8 0');
  modelo.setAttribute('scale', '2 2 2');

});

</script>

</body>
</html>
