<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Modelo 3D A-Frame</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
<a-scene shadow="type: pcfsoft">

  <!-- Fondo con imagen -->
  <a-sky src="image.png"></a-sky>

  <!-- Luces -->
  <a-light type="ambient" intensity="0.5"></a-light>

  <a-light 
    type="directional"
    position="2 5 3"
    intensity="1"
    castShadow="true">
  </a-light>

  <!-- Cámara -->
<a-camera position="0 1.6 6" wasd-controls-enabled="false"></a-camera>

  <!-- Modelo -->
  <a-entity 
    gltf-model="caral-piramidemenor.glb"
    position="0 0.8 0"
    scale="2 2 2"
    shadow="cast: true"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
  </a-entity>

</a-scene>
</body>
</html>
